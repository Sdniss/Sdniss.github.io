name: Generate PDF CV
on:
  push:
    paths:
      - '_data/**' 
      - 'scripts/**'
      - 'main.tex'
      
permissions:
  contents: write

jobs:
  build_cv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-xetex \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-latex-extra \
            texlive-science \
            texlive-bibtex-extra \
            texlive-pictures \
            texlive-luatex \
            fonts-noto-color-emoji
            
      - name: Install Python dependencies
        run: pip install PyYAML Jinja2

      - name: Run CV Generator and Compile
        # This one command now does EVERYTHING thanks to your new script
        run: python scripts/generate_cv.py

      - name: Commit and Push PDF
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add -f assets/pdf/stijn_denissen_cv.pdf
          git commit -m "Automated CV update [skip ci]" || echo "No changes to commit"
          git push origin main
