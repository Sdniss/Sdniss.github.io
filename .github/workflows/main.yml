name: Generate PDF CV
on:
  push:
    paths:
      - '_data/**' 
      - 'scripts/**'
      - 'cv_template.tex'
      
permissions:
  contents: write

jobs:
  build_cv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          persist-credentials: true # CRITICAL for pushing back

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: pip install PyYAML Jinja2

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-fonts-recommended texlive-fonts-extra texlive-latex-extra

      - name: Run CV Generator
        run: python scripts/generate_cv.py

      - name: Compile LaTeX to PDF
        # This step is CRITICAL. Without it, there is no PDF to commit.
        # We use xelatex because your CV uses specific fonts.
        run: |
          sudo apt-get install -y texlive-xetex
          xelatex -interaction=nonstopmode -output-directory=assets/pdf main.tex
          # Move/rename the output if necessary to match your 'git add' path
          mv assets/pdf/main.pdf assets/pdf/stijn_denissen_cv.pdf

      - name: Commit and Push PDF
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Sync with remote to prevent [rejected] error
          git pull --rebase origin main
          
          # 2. Force add the PDF (in case it's in .gitignore)
          git add -f assets/pdf/stijn_denissen_cv.pdf
          
          # 3. Commit with [skip ci] to prevent infinite loops
          git commit -m "Automated CV update [skip ci]" || echo "No changes to commit"
          
          # 4. Push the changes
          git push origin main
