section_title: "Science communication and media"
summary: >
  Over the years, I experimented with different forms of science communication, 
  tailored for different audiences including physiotherapists, patients with MS, 
  and even children. My idea to turn a paper into a song was particularly well received; 
  SciMingo asked me to perform live at the final of the Flemish Thesis Prize 
  at the Brussels city hall. Finally, I poured my PhD into a 3 minute song, 
  performing it live when I received the ‘PhD of The Year’ award.

