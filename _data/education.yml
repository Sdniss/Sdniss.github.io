      - "Note: I was selected for a research internship on brain stimulation under supervision of Prof. Koen Cuypers."
      - "Grade: Cum Laude"
    link: "https://scriptiebank.be/scriptie/2018/trunk-rehabilitation-different-recovery-phases-post-stroke-systematic-review-and-meta"
    pdf: "/assets/pdf/publications/Master_Thesis_Stijn_Anne.pdf"
    key_finding: "
    Selective trunk exercises, sitting reaching protocol and weight-shift training seem to provide beneficial effects for treating trunk impairment post-stroke.
    Furthermore, all protocols had superior effects on some phases post-stroke compared to control therapy.
    This thesis served as a first step towards a Cochrane review by Thijs et al. 2023."

