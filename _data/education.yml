    figure-license: "CC BY 4.0"
    key_finding: "My PhD investigated three ways to deal with scarce data to investigate the relationship between structural brain MRI and cognitive impairment in people with MS with AI:<br>
    1. Designing a smartphone application for cognitive screening in MS (ico<b>gnition</b>)<br>
    2. Leveraging large healthy control databases to predict 'brain age' as in-between step<br>
    3. Establishing a real-world federated learning network to train models without sharing data
    "

