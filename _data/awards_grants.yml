section_title: "Awards and grants"
summary: >
  Over the years, I was successful in several research grants that mainly relied on the two research lines on brain age and federated learning from my PhD.
  The same research lines also resulted in 2 Chinese Scholarship Council (CSC) for PhD students Tianzheng Hu and Xinguang Wang (cfr. "mentoring").

entries:
  - award: "FWO Senior project"
    summary: "This FWO senior project (G0A2Q25N) was awarded to my promoter Prof. Guy Nagels.
    The concepts of this project are an extension of the academic work of my PhD."
    organization: "Fonds Wetenschappelijk Onderzoek"
    amount: "€ 564.000"
    date: "2024"
    link: "https://www.fwo.be/media/axnnmr30/resultaten-senior-onderzoeksprojecten-2024.pdf"
    role: "Project design, writing + writing coordination"

  - award: "PhD Thesis of the Year"
    summary: "In 2024, I was awarded the 'PhD Thesis of the Year' award from the faculty of Medicine and Pharmacy of VUB, together with Dr. Marius Regin.
    During the award ceremony, I explained my PhD in a 3-minute song, in line with my 'a paper in a song' initiative. The award was announced by Prof. Karine Breckpot."
    organization: "VUB UMCOR"
    amount: "€ 600"
    date: "2024"
    figure: "/assets/photos/PhD_thesis_of_the_year.png"
    link: "https://www.vub.be/en/umcor-awards#paragraph-509560"
    linkedin_post_link: "https://www.linkedin.com/posts/stijndenissen_sciencecommunication-audebonehill-kurtbarbaez-activity-7264327911640330240-P9q5?utm_source=share&utm_medium=member_desktop&rcm=ACoAACWeMHoBUf4M7YGORqicoRFAyNZ2cV68jq0"

  - award: "FWO junior postdoc"
    summary: "I obtained this competitive junior post-doctoral fellowship from the first round, covering three years of postdoctoral research at the AIMS lab at VUB (12A6U25N).
    The project is entitled: 'Leveraging recent advances in explainable AI to decode cognitive functioning from T1/FLAIR weighted MR images in MS - An international federated learning approach'."
    organization: "Fonds Wetenschappelijk onderzoek"
    amount: "± € 300.000"
    date: "2024"
    link: "https://www.fwo.be/media/0gshj1ch/resultaten-junior-postdocs-2024.pdf"
    linkedin_post_link: "https://www.linkedin.com/posts/umcor_postdoctoralfellowship-ai-cognitivefunctioning-activity-7241717532624134145-088m?utm_source=social_share_send&utm_medium=member_desktop_web&rcm=ACoAACWeMHoBUf4M7YGORqicoRFAyNZ2cV68jq0"

  - award: "Travel grant"
    summary: "This travel grant was awarded after submission of the abstract entitled 'Transfer learning on structural brain age models to decode cognition in MS: a federated learning approach' to the 2023 edition of ECTRIMS."
    organization: "ECTRIMS conference"
    amount: "€ 400"
    date: "2023"

  - award: "FWO Travel grant"
    summary: "This travel grant covered my research stay for 3 months in Prague, Czechia in 2023 to set up the federated learning network (V412023N)."
    organization: "FWO"
    amount: "€ 5.808"
    date: "2022"
    role: "Awardee"

  - award: "IOF Proof of Concept"
    summary: "This internal VUB grant (IOFPOC57) allowed to kickstart our federated learning network from a technical (e.g. hardware) point of view."
    amount: "75.000"
    role: "Project design, writing + writing coordination"
    link: "https://researchportal.vub.be/en/projects/iof-proof-of-concept-need-neur-o-aims-federated-learning-demonstr/fingerprints/"

  - award: "Grant for OpenMR Virtual 2021"
    organization: "Merck"
    summary: "This grant supported the costs to organise the 2021 edition of OpenMR, which was virtual due to COVID-19."
    amount: "€ 1000"
    date: "2021"
    role: "Awardee"
    link: "https://openmrbenelux.github.io/"

  - award: "Baekeland Grant"
    organization: "Vlaams agentschap innoveren & ondernemen (VLAIO)"
    summary: "I secured a personal Baekeland PhD grant from the first round for my project 'Creating the MS compass of the future: imaging AI to predict disease progression' (HBC.2019.2579, good news reveived on Friday the 13th 🙂)
    This grant allowed me to carry out my industrial PhD, a collaboration between VUB and imaging AI company icometrix."
    amount: "€ 279.475"
    date: "2019"
    link: "https://www.vlaio.be/nl/nieuws/26-baekeland-projectenaanvragen-en-6-innovatiemandaten-goedgekeurd"

  - award: "Nominated: Best Young Scientist"
    summary: "Nominated for the Best Young Scientist award of NNR 2019, based on my Cochrane review contribution."
    organization: "Congress on Neurorehabilitation and Neural Repair"
    date: "2019"
    linkedin_post_link: "https://www.linkedin.com/posts/stijndenissen_nnr-kuleuven-activity-6537738720014020608-sRzU?utm_source=share&utm_medium=member_desktop&rcm=ACoAACWeMHoBUf4M7YGORqicoRFAyNZ2cV68jq0"
