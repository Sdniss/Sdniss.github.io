section_title: "Awards and grants"
summary: >
  The list below includes personal grants. The two research lines on brain age and 
  federated learning from my PhD also resulted in 2 Chinese Scholarship Council (CSC) 
  grants, an internal VUB proof-of-concept grant (75.000) and a successful FWO senior 
  project of my promoter Prof. Guy Nagels (G0A2Q25N). In the latter, I orchestrated 
  the writing of 2 research groups and played a key role in the project design and writing.

