section_title: "Mentoring"
summary: >
  Besides daily supervision, I coordinate our federated learning research line with a regular meeting. 
  We align students and other researchers in the network to stay informed about each other's work 
  and grant opportunities. I've also been a jury member of 2 master theses in the master in health care management (VUB).

