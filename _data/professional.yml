section_title: "Professional Experience"
summary: "I started my career as a neurological physiotherapist, primarily treating patients with stroke and multiple sclerosis. During my PhD, I gradually learned how I can also help patients by developing computer algorithms.
This interdisciplinary view is now at the core of the iAIMS community I established in Barcelona in 2025. Together, we connect and enthuse people about how we can achieve real clinical impact with AI in MS."
