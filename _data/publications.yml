    key_finding: "This is a summary in Stroke's 'Cochrane Corner' of the eponymous Cochrane review. This review suggests that trunk training improves basic ADL, trunk function, standing balance, walking ability, upper and lower limb function, and quality of life."

  - authors: "Thijs L, Voets E, Denissen S, Mehrholz J, Elsner B, Lemmens R and Verheyden G"
    year: 2023
    title: "Trunk training for improving activities in people with stroke"
    journal: "Cochrane Database of Systematic Reviews"
    volume_issue: "(3)"
    journal_metrics:
      year: "2023"
      if: "8.8"
      q-factor: "Q1"
    joint_first: false
    link: "https://www.cochranelibrary.com/cdsr/doi/10.1002/14651858.CD013712.pub2/full/nl"
    figure: "/assets/images/pub-figures/Thijs_2023.jpg"
    figure-license: "Copyright © 2023 The Cochrane Collaboration. Published by John Wiley & Sons, Ltd."
    pdf: "/assets/pdf/publications/Thijs_Cochrane_2023.pdf"
    key_finding: "There is evidence to suggest that trunk training as part of rehabilitation improves ADL, trunk function, standing balance, walking ability, upper and lower limb function, and quality of life in people aMer stroke.
    Core-stability, selective-, and unstable-trunk training were the trunk training approaches mostly applied in the included trials."

