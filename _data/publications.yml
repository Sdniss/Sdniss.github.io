  - authors: "Xinguang Wang, Nguyen Linh Trung, Oliver Y. Chen, Jeroen Van Schependom, Stijn Denissen and Guy Nagels"
    year: 2026
    title: "PDD-FANs: Personalized Decentralized Federated Adversarial Networks with Defense Mechanism in Non-IID Setting"
    journal: "IEEE TrustCom 2025 (Conference)"
    joint_first: false
    link: "https://ieeexplore.ieee.org/document/11354869"
    key_finding: "This paper introduces a new federated learning method: 'PDD-FANs'. Using an ablation study with Byzantine attack, the method outperforms the state of the art in handling non-IID data."

  - authors: "Sosa A, O’Neill KA, Billiet T, Chen J, Couvreur L, Denissen S, Lustberg M, Pehel S, Ribbens A and Krupp L"
    year: 2025
    title: "Incorporating measures of cognitive processing speed and brain volume in clinical management of pediatric onset MS"
    journal: "Pediatric Neurology"
    journal_metrics:
      year: "2024"
      if: "2.1"
      q-factor: "Q2"
    joint_first: false
    link: "https://www.pedneur.com/article/S0887-8994(25)00328-5/abstract"
    key_finding: "Whole brain volume percentile (r = 0.4, P = 0.01), white matter percentile (r = 0.4, P = 0.01), and white matter lesion volume (r = −0.4, P = 0.005) were associated with SDMT score. Annualized percent brain volume change of the hippocampus (measured a median of 1.6 years apart) significantly correlated with follow-up SDMT (r = 0.4, P = 0.02), and annualized percent brain volume change of the thalamus correlated with annual change in SDMT z-score (r = 0.4, P = 0.009)."

  - authors: "Trinh Ngoc Huynh, Nguyen Duc Kien, Nguyen Hai Anh, Dinh Tran Hiep, Manuela Vaneckova, Tomas Uher, Jeroen Van Schependom, Stijn Denissen, Tran Quoc Long, Nguyen Linh Trung and Guy Nagels"
    year: 2025
    title: "Latent Representation Learning from 3D Brain MRI for Interpretable Prediction in Multiple Sclerosis"
    journal: "arXiv preprint"
    volume_issue: "arXiv:2510.00051"
    joint_first: false
    link: "https://arxiv.org/abs/2510.00051"
    pdf: "/assets/pdf/publications/Trinh_Ngoc_Latent_2025.pdf"
    key_finding: "This paper presents InfoVAE-Med3D, a latent-representation learning approach for 3D brain MRI that targets interpretable biomarkers of cognitive decline.
    Across reconstruction and downstream prediction tasks (prediction of age and cognitive performance), InfoVAE-Med3D consistently outperforms other VAE variants, indicating a richer latent space."

  - authors: "Denissen S*, Van Laethem D*, Baijot J, Costers L, Descamps A, Van Remoortel A, Van Merhaegen-Wieleman A, D’hooghe M, D'Haeseleer M, Smeets D, Sima DM, Van Schependom J and Nagels G"
    year: 2025
    title: "A New Smartphone-Based Cognitive Screening Battery for Multiple Sclerosis (icognition): Validation Study"
    journal: "Journal of Medical Internet Research"
    volume_issue: "27, e53503"
    journal_metrics:
      year: "2024"
      if: "6.0"
      q-factor: "Q1"
    joint_first: true
    pdf: "/assets/pdf/publications/Denissen_2025_JMIR.pdf"
    key_finding: "This paper validated a new smartphone app to screen for cognitive deterioration in people with MS.
    All icognition tests correlated well with their paper-and-pencil equivalents, negatively correlated with the Expanded Disability Status Scale, and showed moderate test-retest reliability.
    Surprisingly, test performance was comparable between people with MS and healthy participants for all cognitive tests, both in icognition and the gold standard paper-and-pencil tests."
    link: "https://pubmed.ncbi.nlm.nih.gov/39832354/"
    figure: "/assets/images/pub-figures/denissen-2025_icognition_figure.png"
    figure-license: "CC BY 4.0"

  - authors: "De Keersmaecker E, Guida S, Denissen S, Dewolf L, Nagels G, Jansen B, Beckwée D and Swinnen E"
    year: 2025
    title: "Virtual reality for multiple sclerosis rehabilitation"
    journal: "Cochrane Database of Systematic Reviews"
    volume_issue: "(1)"
    journal_metrics:
      year: "2024"
      if: "9.4"
      q-factor: "Q1"
    joint_first: false
    key_finding: "We found evidence that the use of virtual reality may be more effective than no intervention in improving upper limb function and participation and quality of life.
    Training with virtual reality may be superior to conventional therapy for improving balance and postural control, and participation and quality of life.
    For the other outcomes, there was no clear difference between virtual reality and conventional therapy. There was insufficient evidence to reach conclusions about the effect of virtual reality on global motor function, activity limitations and adverse events. "
    figure: "/assets/images/pub-figures/De_Keersmaecker_2025-figure.svg"
    figure-license: "Copyright © 2025 The Cochrane Collaboration. Published by John Wiley & Sons, Ltd."
    link: "https://www.cochranelibrary.com/cdsr/doi/10.1002/14651858.CD013834.pub2/nl"
    pdf: "/assets/pdf/publications/De_Keersmaecker_2025.pdf"

  - authors: "Wittens MMJ*, Denissen S*, Sima DM, ..., Engelborghs S"
    year: 2024
    title: "Brain age as a biomarker for pathological versus healthy ageing–a REMEMBER study"
    journal: "Alzheimer's research & therapy"
    volume_issue: "16.1 (2024): 128"
    journal_metrics:
      year: "2024"
      if: "7.6"
      q-factor: "Q1"
    joint_first: true
    key_finding: "Patients with Mild Cognitive Impairment and Alzheimer's Disease Dementia showed an increased brain age compared to their chronological age. Overall, brain age outperformed BPAD and chronological age in terms of classification accuracy across the AD spectrum. There was a weak-to-moderate correlation between total MMSE score and both brain age and BPAD.
    BPAD was increased in heavy alcohol drinkers compared to non-/sporadic and moderate drinkers."
    link: "https://pubmed.ncbi.nlm.nih.gov/38877568/"
    pdf: "/assets/pdf/publications/Wittens_2024_Brain_age.pdf"
    figure: "/assets/images/pub-figures/Wittens_2024.webp"
    figure-license: "CC BY 4.0"

  - authors: "Van Laethem D*, Denissen S*, Costers L, Descamps A, Baijot J, Van Remoortel A, Van Merhaegen-Wieleman A, D’hooghe M, D'Haeseleer M, Smeets D, Sima DM, Van Schependom J and Nagels G"
    year: 2024
    title: "The Finger Dexterity Test: Validation study of a smartphone-based manual dexterity assessment"
    journal: "Multiple Sclerosis Journal"
    volume_issue: "30(1), 121-130"
    journal_metrics:
      year: "2024"
      if: "5.0"
      q-factor: "Q1"
    joint_first: true
    key_finding: "The Finger Dexterity Test significantly correlated with the gold-standard Nine Hole Peg Test (9HPT).
    MS subjects had significantly higher FDT scores than healthy subjects, which was not the case for the 9HPT.
    A significant correlation with age, Expanded Disability Status Scale (EDSS), and disease duration for the non-dominant hand was observed.
    There was a good test–retest reliability in healthy subjects."
    figure: "/assets/images/pub-figures/Van_Laethem_2023.jpg"
    pdf: "/assets/pdf/publications/Van_Laethem_2023.pdf"
    figure-license: "© The Author(s), 2023. MSJ papers are typically published under Creative Commons."
    link: "https://journals.sagepub.com/doi/10.1177/13524585231216007?url_ver=Z39.88-2003&rfr_id=ori:rid:crossref.org&rfr_dat=cr_pub%20%200pubmed"

