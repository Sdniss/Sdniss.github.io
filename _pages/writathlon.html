<script>
const DATA_KEY = 'writathlon_v2_system';
let currentWeek = null;
let constitution = "";

const templates = {
    imrad: [{n: 'Manuscript', chaps: [{n:'Introduction',p:0},{n:'Methods',p:0},{n:'Results',p:0},{n:'Discussion',p:0}]}],
    book: [{n: 'Part I', chaps: [{n:'Chapter 1',p:0},{n:'Chapter 2',p:0}]}, {n: 'Part II', chaps: [{n:'Chapter 3',p:0}]}]
};

async function loadConstitution() {
    const LOCAL_FILE = "/assets/txt/writing_schedule_recipe.txt";
    try {
        const r = await fetch(LOCAL_FILE);
        if (!r.ok) throw new Error("Local file not found");
        constitution = await r.text();
    } catch(e) {
        constitution = "";
    }
}

function autoSave() {
    const data = JSON.parse(localStorage.getItem(DATA_KEY) || '{}');
    data.goal = document.getElementById('goal-input').value;
    data.deadline = document.getElementById('deadline-input').value;
    data.hours = document.getElementById('hours-input').value;
    data.days = document.getElementById('days-input').value;
    data.limiters = document.getElementById('limiters-input').value;
    data.apiKey = document.getElementById('api-key-input').value;
    data.outline = Array.from(document.querySelectorAll('.part-box')).map(p => ({
        name: p.querySelector('.p-name').value,
        chaps: Array.from(p.querySelectorAll('.c-row')).map(c => ({
            n: c.querySelector('.c-name').value, p: c.querySelector('.c-p').value
        }))
    }));
    localStorage.setItem(DATA_KEY, JSON.stringify(data));
}

function loadSystem() {
    const data = JSON.parse(localStorage.getItem(DATA_KEY) || '{}');
    if (!data.goal && !data.outline) return;
    document.getElementById('goal-input').value = data.goal || '';
    document.getElementById('deadline-input').value = data.deadline || '';
    document.getElementById('hours-input').value = data.hours || 7;
    document.getElementById('days-input').value = data.days || '';
    document.getElementById('limiters-input').value = data.limiters || '';
    document.getElementById('api-key-input').value = data.apiKey || '';
    const out = document.getElementById('outline-area');
    out.innerHTML = '';
    (data.outline || []).forEach(p => {
        const pEl = addPart(p.name);
        p.chaps.forEach(c => addChapter(pEl.querySelector('.c-list'), c.n, c.p));
    });
    if (data.deadline) initializePlan();
    updateStreak();
}

function applyTemplate() {
    const val = document.getElementById('template-select').value;
    if(!val) return;
    document.getElementById('outline-area').innerHTML = '';
    templates[val].forEach(p => {
        const pEl = addPart(p.n);
        p.chaps.forEach(ch => addChapter(pEl.querySelector('.c-list'), ch.n, ch.p));
    });
    autoSave();
}

function initializePlan() {
    const goal = document.getElementById('goal-input').value;
    const deadline = document.getElementById('deadline-input').value;
    const hrs = document.getElementById('hours-input').value;
    const days = document.getElementById('days-input').value;
    if (!deadline) { alert("A hard deadline is required."); return; }
    document.getElementById('setup-card').style.display = 'none';
    document.getElementById('active-params-box').style.display = 'block';
    document.getElementById('atp-card').style.display = 'block';
    document.getElementById('param-summary').innerHTML = `
        <div style="border-bottom: 1px solid rgba(0,0,0,0.05); margin-bottom: 10px; padding-bottom: 5px;">
            <strong style="color: var(--primary); font-size: 0.85rem;">${goal || 'Untitled Project'}</strong>
        </div>
        <div style="display: grid; grid-template-columns: 1fr; gap: 5px; opacity: 0.8;">
            <div>📅 Deadline: <strong>${new Date(deadline).toLocaleDateString()}</strong></div>
            <div>⏲️ Target: <strong>${hrs}h / week</strong></div>
            <div>📝 Schedule: <strong>${days || 'Daily'}</strong></div>
        </div>
    `;
    renderATP(deadline, parseFloat(hrs));
    autoSave();
}

// Update the Dot helper to include PREP
function getEmpDots(phase) {
    const map = {
        'PREP': ['Metadata', 'Feedback'],
        'BASE': ['Research', 'Write', 'Feedback'],
        'BUILD': ['Edit', 'Zoom', 'Feedback'],
        'PEAK': ['Edit'],
        'RACE': ['Metadata']
    };

    const categories = ['Research', 'Write', 'Edit', 'Zoom', 'Metadata', 'Feedback'];
    return categories.map(cat => {
        const isActive = map[phase] && map[phase].includes(cat);
        return `<td class="${isActive ? 'emp-dot' : 'emp-none'}">${isActive ? '●' : '·'}</td>`;
    }).join('');
}

function renderATP(deadline, baseHrs) {
    const body = document.getElementById('atp-body');
    body.innerHTML = '';
    const today = new Date();
    today.setHours(0,0,0,0);
    const end = new Date(deadline);

    // 1. Calculate total weeks available
    const weeksTotal = Math.ceil((end - today) / (1000 * 60 * 60 * 24 * 7));

    // 2. Define Fixed Phases
    const prepWeeks = 1;
    const peakWeeks = 2;
    const raceWeeks = 1;
    const fixedTotal = prepWeeks + peakWeeks + raceWeeks;

    // 3. Calculate Flexible Middle (Base + Build)
    const flexibleWeeks = Math.max(0, weeksTotal - fixedTotal);
    const baseEnd = prepWeeks + Math.floor(flexibleWeeks * 0.5);
    const buildEnd = baseEnd + Math.ceil(flexibleWeeks * 0.5);

    for (let i = 0; i < weeksTotal; i++) {
        let phase = "";
        let loadFactor = 1.0;
        let weekNum = i + 1;

        // --- PHASE ALLOCATION ---

        // PREP: Fixed 1 week
        if (i < prepWeeks) {
            phase = "PREP";
            loadFactor = 0.6;
        }
        // BASE: ~40% of total (50% of flex)
        else if (i < baseEnd) {
            phase = "BASE";
            loadFactor = (i % 4 === 0) ? 0.7 : 1.0;
        }
        // BUILD: ~40% of total (50% of flex)
        else if (i < buildEnd) {
            phase = "BUILD";
            loadFactor = (i % 4 === 0) ? 0.8 : 1.2;
        }
        // PEAK: Fixed 2 weeks
        else if (i < weeksTotal - raceWeeks) {
            phase = "PEAK";
            loadFactor = 0.9;
        }
        // RACE: Fixed 1 week
        else {
            phase = "RACE";
            loadFactor = 0.5; // Final Taper
        }

        let hrs = baseHrs * loadFactor;
        let d = new Date(today);
        d.setDate(today.getDate() + (i * 7));
        const isCurrent = (today >= d && today < new Date(d.getTime() + 7 * 24 * 60 * 60 * 1000));

        const row = document.createElement('tr');
        row.className = `${isCurrent ? 'active-week-row' : ''} ${loadFactor < 0.9 && phase !== 'PREP' ? 'recovery-row' : ''}`;

        row.innerHTML = `
            <td>${isCurrent ? '🚀' : 'W'+weekNum}</td>
            <td style="font-weight:bold; color:var(--primary)">${phase}</td>
            <td>${hrs.toFixed(1)}h</td>
            ${getEmpDots(phase)}
            <td id="stat-w${weekNum}" onclick="selectWeek(${weekNum}, '${phase}', ${hrs}, ${isCurrent})" style="cursor:pointer; font-size:1.1rem;">⭕</td>
        `;
        body.appendChild(row);
        updateStatusIcon(weekNum);
    }
}

// Update the Motto helper to include PREP
function getMotto(p) {
    const ms = {
        PREP: "Metadata, Setup & Buddy Assignment",
        BASE: "Laying the Foundation & Internal Cycles",
        BUILD: "High-Volume Drafting (Icelandic Style)",
        PEAK: "Clutter Removal & Flow",
        RACE: "Final Polish & Submission"
    };
    return ms[p] || "";
}

async function generateCoachTasks() {
    const data = JSON.parse(localStorage.getItem(DATA_KEY));
    if (!data.apiKey) { alert("Add API Key first!"); return; }

    const userBriefing = document.getElementById('coach-context').value;
    const today = new Date();
    const end = new Date(data.deadline);
    const weeksRemaining = Math.ceil((end - today) / (1000 * 60 * 60 * 24 * 7));

    // CRUNCH MODE TRIGGER
    const isCrunchMode = weeksRemaining <= 4;

    document.getElementById('task-list').innerHTML = `<p style="text-align:center">Coach is analyzing your progress...</p>`;

    const prompt = `
        SYSTEM LOGIC: ${constitution || "Scientific Athlete Protocol"}

        USER CONTEXT:
        - Project: ${data.goal}
        - Phase: ${isCrunchMode ? 'CRUNCH MODE (Ignore Phases)' : currentWeek.phase}
        - Weeks until Deadline: ${weeksRemaining}
        - Weekly Hours: ${currentWeek.hrs}h
        - Coach Briefing: ${userBriefing}
        - Current Limiters: ${data.limiters}

        CURRENT OUTLINE PROGRESS (Remaining Work):
        ${data.outline.map(p => `${p.name}: ${p.chaps.map(c => `${c.n} is ${c.p}% complete`).join(", ")}`).join("\n")}

        INSTRUCTION:
        ${isCrunchMode
            ? "CRITICAL: Deadline is imminent. Disregard periodization phases but do take into account which days to write. Identify every section below 100% and distribute that work logically across this week to ensure submission."
            : "Follow the current phase rules. Focus on tasks relevant to the progress gaps shown above."}

        Use 'Hardest Task First'. 2-5 tasks per day.

        FORMAT:
        ### [Day]
        - [ ] Task (Est. Time)
    `;

    try {
        const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${data.apiKey}`, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({ contents:[{parts:[{text:prompt}]}] })
        });

        const json = await resp.json();
        const raw = json.candidates[0].content.parts[0].text;

        // Parsing logic remains the same...
        const structured = raw.split('###').filter(x => x.trim()).map(s => {
            const lines = s.trim().split('\n');
            return {
                day: lines[0].trim(),
                tasks: lines.slice(1).filter(l => l.includes('[ ]')).map(t => ({
                    txt: t.replace('- [ ]','').replace('*','').trim(),
                    done: false
                }))
            };
        });

        if(!data.microcycles) data.microcycles = {};
        data.microcycles[currentWeek.num] = structured;
        localStorage.setItem(DATA_KEY, JSON.stringify(data));
        renderChecklist(structured);
    } catch(e) {
        document.getElementById('task-list').innerHTML = `<p style="color:red">Coach Error: ${e.message}</p>`;
    }
}

function renderChecklist(days) {
    const container = document.getElementById('task-list');
    container.innerHTML = '';
    let total = 0, done = 0;
    days.forEach((d, dIdx) => {
        const div = document.createElement('div');
        div.className = 'day-block';
        let html = `<div class="day-title">${d.day}</div>`;
        d.tasks.forEach((t, tIdx) => {
            total++; if(t.done) done++;
            html += `<div class="task-row"><input type="checkbox" ${t.done?'checked':''} onchange="toggleTask(${dIdx}, ${tIdx})"><span>${t.txt}</span></div>`;
        });
        div.innerHTML = html; container.appendChild(div);
    });
    document.getElementById('completion-stats').innerText = `${done}/${total} Tasks`;
}

function selectWeek(num, phase, hrs, isCurrent) {
    currentWeek = {num, phase, hrs, isCurrent};
    document.getElementById('checklist-container').style.display = 'block';
    document.getElementById('micro-title').innerText = `Week ${num} Protocol`;
    document.getElementById('phase-motto').innerText = `Current Focus: ${getMotto(phase)}`;
    const data = JSON.parse(localStorage.getItem(DATA_KEY));
    if (data.microcycles?.[num]) renderChecklist(data.microcycles[num]);
    else document.getElementById('task-list').innerHTML = "<p>No tasks generated yet.</p>";
}

function toggleTask(dIdx, tIdx) {
    const data = JSON.parse(localStorage.getItem(DATA_KEY));
    const wk = data.microcycles[currentWeek.num];
    wk[dIdx].tasks[tIdx].done = !wk[dIdx].tasks[tIdx].done;
    localStorage.setItem(DATA_KEY, JSON.stringify(data));
    renderChecklist(wk); updateStatusIcon(currentWeek.num); updateStreak();
}

function updateStatusIcon(num) {
    const data = JSON.parse(localStorage.getItem(DATA_KEY));
    const wk = data.microcycles?.[num];
    const el = document.getElementById(`stat-w${num}`);
    if(!el || !wk) return;
    let t = 0, d = 0; wk.forEach(day => { t += day.tasks.length; d += day.tasks.filter(x => x.done).length; });
    el.innerText = d === 0 ? "⭕" : (d === t ? "✅" : (d/t > 0.5 ? "⭐" : "🚧"));
}

function updateStreak() {
    const data = JSON.parse(localStorage.getItem(DATA_KEY) || '{}');
    let s = 0; if(data.microcycles) Object.values(data.microcycles).forEach(wk => { let t = 0, d = 0; wk.forEach(day => { t += day.tasks.length; d += day.tasks.filter(x => x.done).length; }); if(t > 0 && d/t >= 0.5) s++; });
    document.getElementById('streak-val').innerText = s;
}

function addPart(name = 'New Section') {
    const div = document.createElement('div'); div.className = 'part-box';
    div.innerHTML = `<div style="display:flex; gap:5px; margin-bottom:10px;"><input type="text" class="p-name wa-input" value="${name}" oninput="autoSave()" style="flex-grow:1; font-weight:bold;"><button class="btn-delete" onclick="this.parentElement.parentElement.remove(); autoSave();">🗑️</button></div><div class="c-list"></div><button class="btn-secondary" onclick="addChapter(this.previousElementSibling)">+ Add Sub-section</button>`;
    document.getElementById('outline-area').appendChild(div); return div;
}

function addChapter(list, name = '', p = 0) {
    const d = document.createElement('div'); d.className = 'c-row'; d.style = "display:flex; gap:5px; margin-bottom:8px; align-items:center;";
    d.innerHTML = `<input type="text" class="c-name wa-input" value="${name}" oninput="autoSave()" style="flex-grow:1;"><input type="number" class="c-p wa-input" value="${p}" oninput="autoSave()" style="width:55px"><span class="percent-label">%</span><button class="btn-delete" onclick="this.parentElement.remove(); autoSave();">×</button>`;
    list.appendChild(d);
}

function saveKey() { autoSave(); alert("Key Secured."); }
function editParams() { document.getElementById('setup-card').style.display = 'block'; window.scrollTo({ top: 0, behavior: 'smooth' }); }
function nuclearReset() { if(prompt("Type 'This unicorn will fly' to reset:") === "This unicorn will fly") { localStorage.removeItem(DATA_KEY); location.reload(); } }
window.onload = () => { loadConstitution(); loadSystem(); };
</script>
