<div class="app-container" style="max-width: 500px; margin: auto; text-align: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">

    <div class="deck-selector" style="margin-bottom: 20px;">
        <label for="json-select" style="font-weight: bold; display: block; margin-bottom: 5px;">Select Deck:</label>
        <select id="json-select" onchange="changeDeck(this.value)" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc;">
            <optgroup label="HSK Standard Lists">
                <option value="hsk-data/1.json">HSK Level 1</option>
            </optgroup>

            <optgroup label="My Custom Lists">
                <option value="custom/italki_lesson_1.json">italki lesson 1</option>
                <option value="custom/italki_lesson_2.json">italki lesson 2</option>
            </optgroup>
        </select>
    </div>

    <div id="progress-bar" style="width: 100%; background: #eee; height: 8px; border-radius: 4px; margin-bottom: 10px;">
        <div id="progress-fill" style="width: 0%; background: #2A9D8F; height: 100%; border-radius: 4px; transition: 0.5s;"></div>
    </div>
    <!--
    <div id="avatar-box" style="background: #F8FED7; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #E9C46A;">
        🤖 <span id="avatar-text">Nǐ hǎo! Let's start our science session.</span>
    </div>
    -->

    <div id="card" onclick="flipCard()" style="position: relative; height: 320px; background: white; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; border: 1px solid #eee; transition: transform 0.2s;">
        <button onclick="event.stopPropagation(); playAudio();" style="position: absolute; top: 20px; right: 20px; background: #f0f0f0; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 18px;">🔊</button>

        <h1 id="card-text" style="font-size: 4rem; margin: 0; color: #264653;">...</h1>
        <!-- <p id="card-subtext" style="color: #2A9D8F; font-weight: bold; margin-top: 15px; font-family: monospace;">Tap to flip</p> -->
    </div>

    <div style="margin-top: 30px; display: flex; justify-content: space-between;">
        <button onclick="prevCard()" style="padding: 12px 25px; border-radius: 8px; border: 1px solid #ddd; background: white; cursor: pointer;">Previous</button>
        <button onclick="nextCard()" style="padding: 12px 25px; border-radius: 8px; border: none; background: #264653; color: white; cursor: pointer; font-weight: bold;">Next Word</button>
    </div>

    <div class="audio-controls" style="background: #f9f9f9; padding: 15px; border-radius: 12px; margin: 20px 0; text-align: left; font-size: 0.9rem;">
        <h4 style="margin-top: 0; color: #264653;">Voice Settings 🎙️</h4>

        <div style="margin-bottom: 10px;">
            <label>Speed (Rate): <span id="rate-val">0.8</span></label>
            <input type="range" id="rate-slider" min="0.1" max="2" step="0.1" value="0.8" style="width: 100%;">
        </div>

        <div style="margin-bottom: 10px;">
            <label>Tone (Pitch): <span id="pitch-val">1.1</span></label>
            <input type="range" id="pitch-slider" min="0" max="2" step="0.1" value="1.1" style="width: 100%;">
        </div>

        <div style="margin-bottom: 5px;">
            <label>Volume: <span id="volume-val">1.0</span></label>
            <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="1.0" style="width: 100%;">
        </div>

        <div style="margin-bottom: 10px;">
            <label for="voice-select">Voice Selection:</label>
            <select id="voice-select" style="width: 100%; padding: 5px; border-radius: 5px;"></select>
        </div>
    </div>
</div>

<script src="/assets/js/app.js"></script>
