<div class="app-container" style="max-width: 500px; margin: auto; text-align: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">

    <div class="deck-selector" style="margin-bottom: 20px;">
        <label for="json-select" style="font-weight: bold; display: block; margin-bottom: 5px;">Select Deck:</label>
        <select id="json-select" onchange="changeDeck(this.value)" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc;">
            <optgroup label="HSK Standard Lists">
                <option value="hsk-data/1.json">HSK Level 1</option>
            </optgroup>
            <optgroup label="My Custom Lists">
                <option value="custom/italki_lesson_1.json">italki lesson 1</option>
                <option value="custom/italki_lesson_2.json">italki lesson 2</option>
            </optgroup>
        </select>
    </div>

    <div style="display: flex; justify-content: center; gap: 20px; margin: 20px 0;">
        <button onclick="recordResult(false)" style="background: #e76f51; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold;">✕ Wrong</button>

        <div style="background: #eee; border-radius: 20px; padding: 0 15px; display: flex; flex-direction: column; justify-content: center; min-width: 110px;">
            <span style="font-size: 0.65rem; color: #666; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px;">Correct / Total</span>
            <div id="session-score" style="font-weight: bold; font-size: 1.2rem; line-height: 25px; padding-bottom: 4px;">0 / 0</div>
        </div>

        <button onclick="recordResult(true)" style="background: #2a9d8f; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold;">✓ Correct</button>
    </div>

    <div id="progress-bar" style="width: 100%; background: #eee; height: 8px; border-radius: 4px; margin-bottom: 20px;">
        <div id="progress-fill" style="width: 0%; background: #2A9D8F; height: 100%; border-radius: 4px; transition: 0.5s;"></div>
    </div>

    <div style="position: relative; width: 100%; height: 320px; margin-bottom: 30px;">

        <div id="end-screen" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #264653; color: white; border-radius: 25px; flex-direction: column; justify-content: center; align-items: center; z-index: 20; box-shadow: 0 15px 35px rgba(0,0,0,0.3); transition: 0.3s;">
            <h2 style="margin: 0; font-size: 1.5rem;">Deck Complete! 🎉</h2>
            <div style="font-size: 3.5rem; font-weight: bold; color: #E9C46A; margin: 10px 0;" id="final-percentage">0%</div>
            <p id="final-score-text" style="opacity: 0.9; margin-bottom: 20px;">You got 0 out of 0 correct.</p>
            <button onclick="location.reload()" style="background: #E9C46A; color: #264653; border: none; padding: 12px 30px; border-radius: 12px; cursor: pointer; font-weight: bold; transition: transform 0.2s;">Restart Session</button>
        </div>

        <div id="card" onclick="flipCard()" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; border: 1px solid #eee; transition: background 0.3s, transform 0.2s; z-index: 10;">

            <button onclick="event.stopPropagation(); playAudio();" style="position: absolute; top: 20px; right: 20px; background: #f0f0f0; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 18px; z-index: 15;">🔊</button>

            <h1 id="card-text" style="font-size: 4rem; margin: 0; color: #264653; padding: 0 20px; word-wrap: break-word;">...</h1>
            <p id="card-subtext" style="color: #666; font-size: 0.9rem; position: absolute; bottom: 20px;">Tap to flip</p>
        </div>

    </div>

    <details style="margin-top: 30px; text-align: left; background: #f9f9f9; padding: 10px; border-radius: 12px; border: 1px solid #eee;">
        <summary style="cursor: pointer; color: #264653; font-weight: bold; padding: 5px;">🎙️ Voice & Audio Settings</summary>
        <div class="audio-controls" style="font-size: 0.8rem; margin-top: 10px; padding: 10px;">
            <div style="margin-bottom: 10px;">
                <label>Speed (Rate): <span id="rate-val">0.8</span></label>
                <input type="range" id="rate-slider" min="0.1" max="2" step="0.1" value="0.8" style="width: 100%;">
            </div>
            <div style="margin-bottom: 10px;">
                <label>Tone (Pitch): <span id="pitch-val">1.1</span></label>
                <input type="range" id="pitch-slider" min="0" max="2" step="0.1" value="1.1" style="width: 100%;">
            </div>
            <div style="margin-bottom: 15px;">
                <label>Volume: <span id="volume-val">1.0</span></label>
                <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="1.0" style="width: 100%;">
            </div>
            <label style="display: block; margin-bottom: 5px;">Voice Selection:</label>
            <select id="voice-select" style="width: 100%; padding: 5px; border-radius: 5px; border: 1px solid #ccc;"></select>
        </div>
    </details>
</div>

<script src="/assets/js/app.js"></script>
